name: Update Projects from GitHub

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GitHub repositories
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -H "Authorization: token $GITHUB_TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/users/AlvinManojAlex/repos?sort=created&direction=desc&per_page=100" \
               > repos.json

          jq '[.[] | {
            id: .id,
            name: .name,
            description: .description,
            html_url: .html_url,
            created_at: .created_at,
            topics: .topics,
            language: .language
          } | select(.topics | index("featured"))]' repos.json > public/projects.json

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add public/projects.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Updated projects data"
            git push
          fi